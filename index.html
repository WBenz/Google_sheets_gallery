<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Advanced Projects Test</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 40px 0;
        }

        .filters {
            text-align: center;
            margin-bottom: 30px;
        }

            .filters button {
                margin: 5px;
                padding: 10px 20px;
                border: none;
                background: #222;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

                .filters button:hover {
                    background: #555;
                }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }

            .card:hover {
                transform: translateY(-5px);
            }

            .card img {
                width: 100%;
                height: 200px;
                object-fit: cover;
            }

        .card-content {
            padding: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

            .modal.active {
                display: flex;
            }

            .modal iframe {
                width: 80%;
                height: 450px;
                margin-bottom: 20px;
            }

            .modal img {
                max-width: 80%;
                max-height: 400px;
                margin-bottom: 15px;
            }

        .close {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h1>Our Projects</h1>

    <div class="filters">
        <button onclick="filterProjects('all')">All</button>
        <button onclick="filterProjects('web')">Web</button>
        <button onclick="filterProjects('graphic')">Graphic</button>
        <button onclick="filterProjects('motion')">Motion</button>
    </div>

    <div class="grid" id="projects"></div>

    <div class="modal" id="modal">
        <div class="close" onclick="closeModal()">✖</div>
        <div id="modalContent"></div>
    </div>

    <script>

        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSzgDa6M2D5mjfi8e4OvbfWjRoegScwR0z66AmPZKhAf19u8QSIwUM_LKXOrWk__3rs8vtsS4Q7GQ39/pub?output=csv";

let allProjects = [];

fetch(sheetURL)
  .then(res => res.text())
  .then(data => {
    const rows = data.split("\n").slice(1);
    rows.forEach(row => {
      const cols = row.split(",");
      if(cols.length >= 8){
        allProjects.push({
          category: cols[0].trim(),
          title: cols[1].trim(),
          description: cols[2].trim(),
          images: cols[3].trim(),
          video: cols[4].trim(),
          link: cols[5].trim(),
          year: cols[6].trim(),
          featured: cols[7].trim()
        });
      }
    });
    displayProjects(allProjects);
  });

function displayProjects(projects){
  const container = document.getElementById("projects");
  container.innerHTML = "";

  projects.forEach(project => {

    let firstImage = project.images ? project.images.split("|")[0] : "https://via.placeholder.com/800x500";

    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${firstImage}">
      <div class="card-content">
        <h3>${project.title}</h3>
        <p>${project.description}</p>
      </div>
    `;
    card.onclick = () => openModal(project);
    container.appendChild(card);
  });
}

function filterProjects(category){
  if(category === "all"){
    displayProjects(allProjects);
  } else {
    displayProjects(allProjects.filter(p => p.category === category));
  }
}

function openModal(project){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");
  content.innerHTML = "";

  // VIDEO
  if(project.video){
    let embedURL = "";

    if(project.video.includes("youtube")){
      const videoID = project.video.split("v=")[1];
      embedURL = `https://www.youtube.com/embed/${videoID}`;
    }

    if(project.video.includes("vimeo")){
      const videoID = project.video.split("vimeo.com/")[1];
      embedURL = `https://player.vimeo.com/video/${videoID}`;
    }

    if(embedURL){
      content.innerHTML += `<iframe src="${embedURL}" frameborder="0" allowfullscreen></iframe>`;
    }
  }

  // IMAGES
  if(project.images){
    const imagesArray = project.images.split("|");
    imagesArray.forEach(img => {
      content.innerHTML += `<img src="${img}">`;
    });
  }

  content.innerHTML += `<h2>${project.title}</h2><p>${project.description}</p>`;

  modal.classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

    </script>

</body>
</html>
