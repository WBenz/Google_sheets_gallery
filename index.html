<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunetek Studio – Projects</title>

    <style>
        :root {
            --bg: #070707;
            --card: #111;
            --accent: #ffffff;
            --muted: #888;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        .loader {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 9999;
        }

            .loader span {
                width: 40px;
                height: 40px;
                border: 3px solid #333;
                border-top: 3px solid white;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* HERO */
        .hero {
            height: 80vh;
            position: relative;
            display: flex;
            align-items: center;
            padding: 80px;
            background-size: cover;
            background-position: center;
        }

            .hero::after {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(to right, rgba(0,0,0,0.9), rgba(0,0,0,0.3));
            }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 600px;
            animation: fadeUp 1s ease forwards;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .hero button {
            padding: 12px 30px;
            background: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

            .hero button:hover {
                background: #ddd;
            }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        /* FILTERS */
        .filters {
            text-align: center;
            padding: 40px 0 20px;
        }

            .filters button {
                margin: 8px;
                padding: 10px 25px;
                background: transparent;
                border: 1px solid #222;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

                .filters button:hover {
                    background: white;
                    color: black;
                }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
            gap: 30px;
            padding: 40px;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            opacity: 0;
            transform: translateY(30px);
        }

            .card.visible {
                opacity: 1;
                transform: translateY(0);
            }

            .card img {
                width: 100%;
                height: 230px;
                object-fit: cover;
                transition: 0.4s;
            }

            .card:hover img {
                transform: scale(1.08);
                opacity: 0.7;
            }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .card-content {
            padding: 20px;
        }

            .card-content h3 {
                margin: 0 0 10px;
            }

            .card-content p {
                margin: 0;
                color: var(--muted);
                font-size: 14px;
            }

        /* MODAL */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
            padding: 40px;
        }

            .modal.active {
                opacity: 1;
                pointer-events: auto;
            }

        .modal-content {
            max-width: 1000px;
            width: 100%;
            animation: fadeUp 0.4s ease;
        }

        iframe {
            width: 100%;
            height: 520px;
            margin-bottom: 20px;
        }

        .slider {
            position: relative;
        }

            .slider img {
                width: 100%;
                max-height: 550px;
                object-fit: contain;
                transition: 0.4s;
            }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 35px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            cursor: pointer;
        }

            .arrow.left {
                left: 10px
            }

            .arrow.right {
                right: 10px
            }

        .close {
            position: absolute;
            top: 30px;
            right: 50px;
            font-size: 35px;
            cursor: pointer;
        }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .hero {
                padding: 40px;
                height: 70vh
            }

                .hero h1 {
                    font-size: 32px
                }

            iframe {
                height: 300px
            }
        }
    </style>
</head>

<body>

    <div class="loader" id="loader"><span></span></div>

    <section class="hero" id="hero" style="display:none;">
        <div class="hero-content">
            <h1 id="heroTitle"></h1>
            <p id="heroDesc"></p>
            <button onclick="scrollToProjects()">Explore Projects</button>
        </div>
    </section>

    <div class="filters" id="filters"></div>

    <div class="grid" id="projects"></div>

    <div class="modal" id="modal">
        <div class="close" onclick="closeModal()">✖</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>

        const sheetURL ="https://docs.google.com/spreadsheets/d/e/2PACX-1vSzgDa6M2D5mjfi8e4OvbfWjRoegScwR0z66AmPZKhAf19u8QSIwUM_LKXOrWk__3rs8vtsS4Q7GQ39/pub?output=csv";

let allProjects=[];
let currentImages=[];
let currentSlide=0;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{
  const rows=data.split("\n").slice(1);
  rows.forEach(row=>{
    const cols=row.split(",");
    if(cols.length>=8){
      allProjects.push({
        category:cols[0].trim(),
        title:cols[1].trim(),
        description:cols[2].trim(),
        images:cols[3].trim(),
        video:cols[4].trim(),
        year:cols[6].trim(),
        featured:cols[7].trim()
      });
    }
  });
  init();
});

function init(){
  document.getElementById("loader").style.display="none";
  setupHero();
  setupFilters();
  displayProjects(allProjects);
  revealOnScroll();
}

function setupHero(){
  let featured=allProjects.find(p=>p.featured==="yes");
  if(!featured) featured=allProjects[0];
  if(!featured) return;

  let bg="";
  if(featured.video && featured.video.includes("youtube")){
    const id=featured.video.split("v=")[1];
    bg=`https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
  } else if(featured.images){
    bg=featured.images.split("|")[0];
  }

  const hero=document.getElementById("hero");
  hero.style.backgroundImage=`url(${bg})`;
  hero.style.display="flex";
  document.getElementById("heroTitle").innerText=featured.title;
  document.getElementById("heroDesc").innerText=featured.description;
}

function setupFilters(){
  const counts={web:0,graphic:0,motion:0};
  allProjects.forEach(p=>{
    if(counts[p.category]!==undefined) counts[p.category]++;
  });

  const filters=document.getElementById("filters");
  filters.innerHTML=`
    <button onclick="filterProjects('all')">All (${allProjects.length})</button>
    <button onclick="filterProjects('web')">Web (${counts.web})</button>
    <button onclick="filterProjects('graphic')">Graphic (${counts.graphic})</button>
    <button onclick="filterProjects('motion')">Motion (${counts.motion})</button>
  `;
}

function getYouTubeThumb(url){
  const id=url.split("v=")[1];
  return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
}

function displayProjects(projects){
  const container=document.getElementById("projects");
  container.innerHTML="";
  projects.forEach(p=>{
    let thumb="";
    if(p.video){
      thumb=p.video.includes("youtube")?getYouTubeThumb(p.video):"https://via.placeholder.com/800x500?text=Video";
    } else if(p.images){
      thumb=p.images.split("|")[0];
    }

    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img loading="lazy" src="${thumb}">
      ${p.video?'<div class="overlay">▶</div>':''}
      <div class="card-content">
        <h3>${p.title}</h3>
        <p>${p.year}</p>
      </div>
    `;
    card.onclick=()=>openModal(p);
    container.appendChild(card);
  });
}

function filterProjects(cat){
  if(cat==="all") displayProjects(allProjects);
  else displayProjects(allProjects.filter(p=>p.category===cat));
  revealOnScroll();
}

function openModal(p){
  const modal=document.getElementById("modal");
  const content=document.getElementById("modalContent");
  content.innerHTML="";
  document.body.style.overflow="hidden";

  if(p.video){
    let embed="";
    if(p.video.includes("youtube")){
      const id=p.video.split("v=")[1];
      embed=`https://www.youtube.com/embed/${id}`;
    }
    if(p.video.includes("vimeo")){
      const id=p.video.split("vimeo.com/")[1];
      embed=`https://player.vimeo.com/video/${id}`;
    }
    content.innerHTML+=`<iframe src="${embed}" frameborder="0" allowfullscreen></iframe>`;
  }

  if(!p.video && p.images){
    currentImages=p.images.split("|");
    currentSlide=0;
    content.innerHTML+=`
      <div class="slider">
        <span class="arrow left" onclick="prevSlide()">‹</span>
        <img id="slideImage" src="${currentImages[0]}">
        <span class="arrow right" onclick="nextSlide()">›</span>
      </div>
    `;
  }

  content.innerHTML+=`<h2>${p.title}</h2><p>${p.description}</p>`;
  modal.classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.body.style.overflow="auto";
}

function nextSlide(){
  currentSlide=(currentSlide+1)%currentImages.length;
  document.getElementById("slideImage").src=currentImages[currentSlide];
}

function prevSlide(){
  currentSlide=(currentSlide-1+currentImages.length)%currentImages.length;
  document.getElementById("slideImage").src=currentImages[currentSlide];
}

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeModal();
  if(e.key==="ArrowRight") nextSlide();
  if(e.key==="ArrowLeft") prevSlide();
});

function revealOnScroll(){
  const cards=document.querySelectorAll(".card");
  const trigger=window.innerHeight*0.9;
  cards.forEach(card=>{
    const top=card.getBoundingClientRect().top;
    if(top<trigger) card.classList.add("visible");
  });
}

window.addEventListener("scroll",revealOnScroll);

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

    </script>

</body>
</html>
