<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - Combined Version</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px 30px;
        }

        h1 {
            font-size: 2.5rem;
        }

        .subtitle {
            opacity: 0.6;
            margin-top: 10px;
        }

        .filters {
            margin: 30px 0 50px;
        }

        .filter-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 1px solid #00ffff;
            background: transparent;
            color: #00ffff;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.3s;
        }

            .filter-btn.active,
            .filter-btn:hover {
                background: #00ffff;
                color: black;
            }

        .category-section {
            margin-bottom: 80px;
            transition: 0.4s ease;
        }

            .category-section.hide {
                opacity: 0;
                transform: scale(0.98);
                pointer-events: none;
                height: 0;
                overflow: hidden;
                margin-bottom: 0;
            }

            .category-section h2 {
                margin-bottom: 30px;
                font-size: 1.8rem;
            }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 40px;
            max-width: 1200px;
            margin: auto;
        }

        .project-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s ease;
        }

            .project-card:hover {
                transform: translateY(-8px);
            }

            .project-card img {
                width: 100%;
                height: 200px;
                object-fit: cover;
                border-radius: 12px;
                margin-bottom: 15px;
            }

            .project-card h3 {
                margin-bottom: 10px;
            }

            .project-card p {
                font-size: 0.9rem;
                opacity: 0.8;
            }

            .project-card small {
                display: block;
                margin-top: 10px;
                opacity: 0.6;
            }

            .project-card a {
                display: inline-block;
                margin-top: 15px;
                padding: 8px 15px;
                background: #00ffff;
                color: black;
                text-decoration: none;
                border-radius: 8px;
                font-weight: bold;
                transition: 0.3s;
            }

                .project-card a:hover {
                    background: white;
                }

        footer {
            padding: 40px;
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <header>
        <h1>Projects</h1>
        <p class="subtitle">Dynamic portfolio powered by Google Sheets</p>
    </header>

    <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="web">Web</button>
        <button class="filter-btn" data-filter="graphic">Graphic</button>
        <button class="filter-btn" data-filter="motion">Motion</button>
    </div>

    <div id="projects-container"></div>

    <footer>
        Combined Category + Filter System
    </footer>

    <script>

        const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSzgDa6M2D5mjfi8e4OvbfWjRoegScwR0z66AmPZKhAf19u8QSIwUM_LKXOrWk__3rs8vtsS4Q7GQ39/pub?output=csv";

        fetch(sheetURL)
            .then(res => res.text())
            .then(data => {

                const rows = data.split("\n").slice(1);
                const container = document.getElementById("projects-container");

                const categoryTitles = {
                    web: "Web Design",
                    graphic: "Graphic Design",
                    motion: "Motion Design"
                };

                const categorySections = {};

                // Create empty sections first
                Object.keys(categoryTitles).forEach(cat => {
                    const section = document.createElement("div");
                    section.classList.add("category-section");
                    section.setAttribute("data-category", cat);

                    section.innerHTML = `
            <h2>${categoryTitles[cat]}</h2>
            <div class="category-grid"></div>
          `;

                    container.appendChild(section);
                    categorySections[cat] = section.querySelector(".category-grid");
                });

                // Add projects
                rows.forEach(row => {

                    if (row.trim() === "") return;

                    const columns = row.split(",");

                    const category = columns[0].trim();
                    const title = columns[1];
                    const description = columns[2];
                    const image = columns[3];
                    const link = columns[4];
                    const year = columns[5];

                    if (!categorySections[category]) return;

                    const card = document.createElement("div");
                    card.classList.add("project-card");

                    card.innerHTML = `
            <img src="${image}" alt="${title}">
            <h3>${title}</h3>
            <p>${description}</p>
            <small>${year}</small>
            <a href="${link}" target="_blank">View Project</a>
          `;

                    categorySections[category].appendChild(card);
                });

                activateFilters();
            });

        function activateFilters() {

            const buttons = document.querySelectorAll(".filter-btn");
            const sections = document.querySelectorAll(".category-section");

            buttons.forEach(button => {

                button.addEventListener("click", () => {

                    document.querySelector(".filter-btn.active").classList.remove("active");
                    button.classList.add("active");

                    const filter = button.dataset.filter;

                    sections.forEach(section => {

                        if (filter === "all" || section.dataset.category === filter) {
                            section.classList.remove("hide");
                        } else {
                            section.classList.add("hide");
                        }

                    });

                });

            });

        }

    </script>

</body>
</html>
