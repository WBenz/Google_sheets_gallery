<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tunetek Studio – Projects</title>

    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --muted: #888;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: white;
            overflow-x: hidden;
        }

        /* ===== Animated Background ===== */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* ===== HERO ===== */
        .hero {
            height: 80vh;
            display: flex;
            align-items: center;
            padding: 80px;
            position: relative;
        }

        .hero-content {
            max-width: 600px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            color: var(--muted);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .hero button {
            padding: 12px 30px;
            border: none;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

            .hero button:hover {
                background: #ddd;
            }

        /* ===== FILTERS ===== */
        .filters-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            padding: 40px 0 10px;
        }

        .filters {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }

            .filters button {
                padding: 8px 20px;
                background: transparent;
                border: none;
                color: white;
                cursor: pointer;
                transition: 0.3s;
            }

                .filters button:hover {
                    opacity: 0.6;
                }

        /* ===== GRID ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
            gap: 30px;
            padding: 40px;
        }

        .card {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            opacity: 0;
            transform: translateY(40px);
        }

            .card.visible {
                opacity: 1;
                transform: translateY(0);
            }

            .card img {
                width: 100%;
                height: 230px;
                object-fit: cover;
                transition: 0.4s;
            }

            .card:hover img {
                transform: scale(1.08);
                opacity: 0.7;
            }

        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            opacity: 0;
            transition: 0.3s;
        }

        .card:hover .overlay {
            opacity: 1;
        }

        .card-content {
            padding: 20px;
        }

            .card-content h3 {
                margin-bottom: 10px;
            }

            .card-content p {
                font-size: 14px;
                color: var(--muted);
            }

        /* ===== MODAL ===== */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.4s;
            padding: 40px;
        }

            .modal.active {
                opacity: 1;
                pointer-events: auto;
            }

        .modal-content {
            max-width: 1000px;
            width: 100%;
        }

        iframe {
            width: 100%;
            height: 520px;
            margin-bottom: 20px;
        }

        .slider {
            position: relative;
        }

            .slider img {
                width: 100%;
                max-height: 550px;
                object-fit: contain;
            }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 35px;
            background: rgba(0,0,0,0.6);
            padding: 10px 15px;
            cursor: pointer;
        }

            .arrow.left {
                left: 10px
            }

            .arrow.right {
                right: 10px
            }

        .close {
            position: absolute;
            top: 30px;
            right: 50px;
            font-size: 35px;
            cursor: pointer;
        }

        @media(max-width:768px) {
            .hero {
                padding: 40px
            }

                .hero h1 {
                    font-size: 32px
                }

            iframe {
                height: 300px
            }
        }
    </style>
</head>

<body>

    <canvas id="bg"></canvas>

    <section class="hero">
        <div class="hero-content">
            <h1>Cutting Edge Digital Experiences</h1>
            <p>We craft modern branding, web and motion systems that move culture forward.</p>
            <button onclick="scrollToProjects()">Explore Projects</button>
        </div>
    </section>

    <div class="filters-wrapper">
        <div class="filters" id="filters"></div>
    </div>

    <div class="grid" id="projects"></div>

    <div class="modal" id="modal">
        <div class="close" onclick="closeModal()">✖</div>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
/* ===== WebGL-style Animated Background ===== */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-0.5)*0.5,
    dy:(Math.random()-0.5)*0.5,
    size:Math.random()*2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,0.5)";
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

/* ===== Google Sheet CMS ===== */
        const sheetURL ="https://docs.google.com/spreadsheets/d/e/2PACX-1vSzgDa6M2D5mjfi8e4OvbfWjRoegScwR0z66AmPZKhAf19u8QSIwUM_LKXOrWk__3rs8vtsS4Q7GQ39/pub?output=csv";
let allProjects=[];
let currentImages=[];
let currentSlide=0;

fetch(sheetURL)
.then(res=>res.text())
.then(data=>{
  const rows=data.split("\n").slice(1);
  rows.forEach(row=>{
    const cols=row.split(",");
    if(cols.length>=8){
      allProjects.push({
        category:cols[0].trim(),
        title:cols[1].trim(),
        description:cols[2].trim(),
        images:cols[3].trim(),
        video:cols[4].trim(),
        year:cols[6].trim()
      });
    }
  });
  setupFilters();
  displayProjects(allProjects);
});

function setupFilters(){
  const counts={web:0,graphic:0,motion:0};
  allProjects.forEach(p=>counts[p.category]++);
  document.getElementById("filters").innerHTML=`
    <button onclick="filterProjects('all')">All (${allProjects.length})</button>
    <button onclick="filterProjects('web')">Web (${counts.web})</button>
    <button onclick="filterProjects('graphic')">Graphic (${counts.graphic})</button>
    <button onclick="filterProjects('motion')">Motion (${counts.motion})</button>
  `;
}

function getYT(url){
  const id=url.split("v=")[1];
  return `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
}

function displayProjects(projects){
  const container=document.getElementById("projects");
  container.innerHTML="";
  projects.forEach(p=>{
    let thumb="";
    if(p.video){
      thumb=p.video.includes("youtube")?getYT(p.video):"https://via.placeholder.com/800x500?text=Video";
    } else if(p.images){
      thumb=p.images.split("|")[0];
    }
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img loading="lazy" src="${thumb}">
      ${p.video?'<div class="overlay">▶</div>':''}
      <div class="card-content">
        <h3>${p.title}</h3>
        <p>${p.year}</p>
      </div>
    `;
    card.onclick=()=>openModal(p);
    container.appendChild(card);
  });
  reveal();
}

function filterProjects(cat){
  if(cat==="all") displayProjects(allProjects);
  else displayProjects(allProjects.filter(p=>p.category===cat));
}

function openModal(p){
  const modal=document.getElementById("modal");
  const content=document.getElementById("modalContent");
  content.innerHTML="";
  document.body.style.overflow="hidden";

  if(p.video){
    let embed="";
    if(p.video.includes("youtube")){
      const id=p.video.split("v=")[1];
      embed=`https://www.youtube.com/embed/${id}`;
    }
    content.innerHTML+=`<iframe src="${embed}" frameborder="0" allowfullscreen></iframe>`;
  }

  if(!p.video && p.images){
    currentImages=p.images.split("|");
    content.innerHTML+=`
      <div class="slider">
        <span class="arrow left" onclick="prevSlide()">‹</span>
        <img id="slideImage" src="${currentImages[0]}">
        <span class="arrow right" onclick="nextSlide()">›</span>
      </div>
    `;
  }

  content.innerHTML+=`<h2>${p.title}</h2><p>${p.description}</p>`;
  modal.classList.add("active");
}

function closeModal(){
  document.getElementById("modal").classList.remove("active");
  document.body.style.overflow="auto";
}

function nextSlide(){
  currentSlide=(currentSlide+1)%currentImages.length;
  document.getElementById("slideImage").src=currentImages[currentSlide];
}

function prevSlide(){
  currentSlide=(currentSlide-1+currentImages.length)%currentImages.length;
  document.getElementById("slideImage").src=currentImages[currentSlide];
}

function reveal(){
  document.querySelectorAll(".card").forEach(card=>{
    setTimeout(()=>card.classList.add("visible"),200);
  });
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}
    </script>

</body>
</html>
